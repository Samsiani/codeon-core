name: Release CodeOn Core

# Triggers on any pushed tag matching v*. Builds an installable ZIP
# and attaches it to the GitHub Release. workflow_dispatch from a
# branch is also supported for validation — in that case the publish
# step is skipped (no tag context).
#
# WHY VENDOR IS COMMITTED FOR THIS PLUGIN: codeon-core is the public
# WordPress.org plugin. The .org SVN distribution requires vendor/
# inside the package anyway, so committing vendor here removes the
# cross-repo Composer auth dependency that would otherwise need a PAT
# with read access to Samsiani/codeon-plugin-basic-architecture. To
# bump the framework version: locally `composer update
# codeon/framework`, commit the regenerated vendor/, then tag.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build + publish release ZIP
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        run: echo "name=${GITHUB_REF##*/}" >> "$GITHUB_OUTPUT"

      - name: Smoke check data bundle
        run: |
          test -f data/locations.php
          test -s data/locations.min.json
          php -l data/locations.php

      - name: Build ZIP
        env:
          TAG: ${{ steps.tag.outputs.name }}
        run: |
          set -euo pipefail
          STAGE="codeon-core"
          OUT="codeon-core-${TAG}.zip"
          mkdir -p build
          rm -rf "build/${STAGE}"
          mkdir -p "build/${STAGE}"
          rsync -a \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "build" \
            --exclude "dist" \
            --exclude "node_modules" \
            --exclude "tests" \
            --exclude "*.md" \
            --exclude "*.zip" \
            --exclude ".gitignore" \
            --exclude ".DS_Store" \
            --exclude "composer.lock" \
            --exclude "composer.json" \
            ./ "build/${STAGE}/"
          (cd build && zip -rq "../${OUT}" "${STAGE}")
          ls -la "${OUT}"

      - name: Extract release notes from readme.txt
        if: startsWith(github.ref, 'refs/tags/')
        env:
          TAG: ${{ steps.tag.outputs.name }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          awk -v v="$VERSION" '
            $0 ~ ("^= " v " ") { flag=1; next }
            flag && /^= [0-9]/ { exit }
            flag && /^== / { exit }
            flag { print }
          ' readme.txt > release-notes.raw
          awk 'NF {n++; nonblank[n]=NR} {line[NR]=$0} END {
            if (n==0) exit;
            for (i=nonblank[1]; i<=nonblank[n]; i++) print line[i]
          }' release-notes.raw > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "Release ${TAG}." > release-notes.md
          fi
          echo "::group::release-notes.md"
          cat release-notes.md
          echo "::endgroup::"

      - name: Publish Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: codeon-core-*.zip
          body_path: release-notes.md
          draft: false

      - name: Dispatch summary
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: |
          echo "::notice::Manual run on a branch — built ZIP successfully but skipped Publish Release (no tag context). Push a tag like \`git tag v0.1.1 && git push origin v0.1.1\` to publish a real release."
