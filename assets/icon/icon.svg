<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="CodeOn Core">
  <!--
    CodeOn plugin icon — CodeOn Core (the family hub + Georgian
    Locations for WooCommerce).
    Family template: deep-blue rounded square, white central glyph,
    CodeOn corner mark. Glyph: stylized "C" arc with a brand-blue
    code-mark dot inside its opening — visually echoes the codeon.ge
    chevron-dot brand mark at scale, signalling "this is the canonical
    CodeOn plugin." Different from the other plugins (which use
    domain-specific glyphs like cards / pins / boxes) so the hub is
    instantly identifiable as the hub. Specs in
    CODEON_PLUGIN_ICON_SYSTEM.md.
  -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e3a8a"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="glyph" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e0e7ff"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="256" height="256" rx="48" ry="48" fill="url(#bg)"/>

  <!--
    Subtle "code lines" gutter, upper-left. Two short horizontal
    strokes at low opacity — reads as an IDE / code-editor texture
    without competing with the glyph. (Replaces the suite's "speed
    lines" cue, which doesn't apply to a settings / hub plugin.)
  -->
  <g opacity="0.16" fill="none" stroke="#ffffff" stroke-linecap="round" stroke-width="6">
    <line x1="36" y1="78"  x2="78"  y2="78"/>
    <line x1="22" y1="112" x2="64"  y2="112"/>
  </g>

  <!-- Soft drop shadow grounding the glyph -->
  <ellipse cx="128" cy="208" rx="64" ry="8" fill="#000000" opacity="0.20"/>

  <!--
    Stylized "C" — thick stroked arc from top opening counter-
    clockwise to bottom opening. Centered slightly left of canvas
    centre (124,128) so the C's opening sits balanced against the
    code-mark dot to its right. Stroke width 26 reads cleanly down
    to a 40px favicon.
  -->
  <g>
    <path d="M 180 80
             A 56 56 0 1 0 180 176"
          fill="none"
          stroke="url(#glyph)"
          stroke-width="26"
          stroke-linecap="round"/>
    <!--
      Code-mark dot inside the C's opening. Brand-blue accent
      echoes the codeon.ge corner mark's chevron-dot pattern at
      scale; reads as "CodeOn" without needing literal type.
    -->
    <circle cx="174" cy="128" r="12" fill="#1e40af"/>
    <circle cx="174" cy="128" r="6"  fill="#ffffff"/>
  </g>

  <!-- CodeOn signature mark, bottom-right corner. Invariant. -->
  <g transform="translate(196 196)" opacity="0.9">
    <rect x="-18" y="-18" width="36" height="36" rx="10" ry="10"
          fill="none" stroke="#ffffff" stroke-width="3"/>
    <path d="M -6 -7 L -11 0 L -6 7"
          fill="none" stroke="#ffffff" stroke-width="3"
          stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="6" cy="0" r="3" fill="#ffffff"/>
  </g>
</svg>
